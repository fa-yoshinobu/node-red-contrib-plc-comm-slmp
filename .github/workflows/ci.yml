name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18
          - 20
          - 22

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Checkout shared verification vectors
        uses: actions/checkout@v6
        with:
          repository: fa-yoshinobu/plc-comm-slmp-cross-verify
          ref: main
          path: plc-comm-slmp-cross-verify
          sparse-checkout: |
            specs/shared
          token: ${{ secrets.CROSS_VERIFY_REPO_TOKEN }}

      - name: Expose shared vectors at sibling path
        run: ln -sfn "$GITHUB_WORKSPACE/plc-comm-slmp-cross-verify" "$GITHUB_WORKSPACE/../plc-comm-slmp-cross-verify"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Run tests
        run: npm test

      - name: Validate package contents
        run: npm pack --dry-run
