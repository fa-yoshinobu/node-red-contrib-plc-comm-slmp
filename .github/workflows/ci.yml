name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18
          - 20
          - 22

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Clone shared verification vectors
        run: |
          rm -rf plc-comm-slmp-cross-verify
          git clone --depth 1 --filter=blob:none --sparse https://github.com/fa-yoshinobu/plc-comm-slmp-cross-verify.git plc-comm-slmp-cross-verify
          git -C plc-comm-slmp-cross-verify sparse-checkout set specs/shared

      - name: Expose shared vectors at sibling path
        run: ln -sfn "$GITHUB_WORKSPACE/plc-comm-slmp-cross-verify" "$GITHUB_WORKSPACE/../plc-comm-slmp-cross-verify"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Run tests
        run: npm test

      - name: Validate package contents
        run: npm pack --dry-run
