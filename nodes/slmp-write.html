<script type="text/javascript">
  const SLMP_WRITE_ADDRESS_TOKEN_RE = /^[A-Z][A-Z0-9]*(?:\.[0-9A-F]+|:[A-Z]+)?(?:,\d+)?$/i;
  const SLMP_WRITE_DEVICE_INFO = Object.freeze({
    SM: { radix: 10, unit: "bit" }, SD: { radix: 10, unit: "word" },
    X: { radix: 16, unit: "bit" }, Y: { radix: 16, unit: "bit" },
    M: { radix: 10, unit: "bit" }, L: { radix: 10, unit: "bit" },
    F: { radix: 10, unit: "bit" }, V: { radix: 10, unit: "bit" },
    B: { radix: 16, unit: "bit" }, D: { radix: 10, unit: "word" },
    W: { radix: 16, unit: "word" }, TS: { radix: 10, unit: "bit" },
    TC: { radix: 10, unit: "bit" }, TN: { radix: 10, unit: "word" },
    LTS: { radix: 10, unit: "bit" }, LTC: { radix: 10, unit: "bit" },
    LTN: { radix: 10, unit: "word" }, STS: { radix: 10, unit: "bit" },
    STC: { radix: 10, unit: "bit" }, STN: { radix: 10, unit: "word" },
    LSTS: { radix: 10, unit: "bit" }, LSTC: { radix: 10, unit: "bit" },
    LSTN: { radix: 10, unit: "word" }, CS: { radix: 10, unit: "bit" },
    CC: { radix: 10, unit: "bit" }, CN: { radix: 10, unit: "word" },
    LCS: { radix: 10, unit: "bit" }, LCC: { radix: 10, unit: "bit" },
    LCN: { radix: 10, unit: "word" }, SB: { radix: 16, unit: "bit" },
    SW: { radix: 16, unit: "word" }, DX: { radix: 16, unit: "bit" },
    DY: { radix: 16, unit: "bit" }, Z: { radix: 10, unit: "word" },
    LZ: { radix: 10, unit: "dword" }, R: { radix: 10, unit: "word" },
    ZR: { radix: 10, unit: "word" }, RD: { radix: 10, unit: "word" },
    G: { radix: 10, unit: "word" }, HG: { radix: 10, unit: "word" }
  });
  const SLMP_WRITE_DEVICE_CODES = Object.keys(SLMP_WRITE_DEVICE_INFO).sort(function (left, right) {
    return right.length - left.length || left.localeCompare(right);
  });
  const SLMP_WRITE_UNSUPPORTED_DEVICE_CODES_BY_FAMILY = Object.freeze({
    "iq-f": ["V", "LTS", "LTC", "LTN", "LSTS", "LSTC", "LSTN", "DX", "DY", "ZR", "RD", "G", "HG"],
    "iq-r": ["G", "HG"],
    "iq-l": ["G", "HG"],
    "mx-f": ["G", "HG"],
    "mx-r": ["G", "HG"],
    qcpu: ["LTS", "LTC", "LTN", "LSTS", "LSTC", "LSTN", "LCS", "LCC", "LCN", "LZ", "RD", "G", "HG"],
    lcpu: ["LTS", "LTC", "LTN", "LSTS", "LSTC", "LSTN", "LCS", "LCC", "LCN", "LZ", "RD", "G", "HG"],
    qnu: ["LTS", "LTC", "LTN", "LSTS", "LSTC", "LSTN", "LCS", "LCC", "LCN", "LZ", "RD", "G", "HG"],
    qnudv: ["LTS", "LTC", "LTN", "LSTS", "LSTC", "LSTN", "LCS", "LCC", "LCN", "LZ", "RD", "G", "HG"]
  });
  const SLMP_WRITE_DTYPE_SUFFIXES = new Set(["S", "D", "L", "F", "STR", "STRING"]);

  function slmpGetWriteCurrentType(typeSelector, fallback) {
    const field = $(typeSelector);
    if (field.length > 0 && field.val()) {
      return field.val();
    }
    return fallback || "str";
  }

  function slmpValidateWriteReferencePath(value) {
    return Boolean(String(value == null ? "" : value).trim());
  }

  function slmpValidateWriteAddress(address, connectionId) {
    const token = String(address || "").trim();
    return SLMP_WRITE_ADDRESS_TOKEN_RE.test(token) && slmpValidateWriteAddressToken(token, slmpWriteCurrentPlcFamily(connectionId));
  }

  function slmpWriteCurrentPlcFamily(connectionId) {
    const connection = connectionId && RED.nodes.node(connectionId);
    return connection && connection.plcFamily ? String(connection.plcFamily).trim().toLowerCase() : "";
  }

  function slmpValidateWriteAddressToken(value, family) {
    let text = String(value == null ? "" : value).trim().toUpperCase();
    if (!text) {
      return false;
    }
    const legacy = slmpParseWriteLegacyStringAddress(text, family);
    if (legacy !== null) {
      return legacy;
    }

    const countMatch = /^(.*?),\s*(\d+)$/.exec(text);
    if (countMatch) {
      text = countMatch[1].trim();
      if (Number.parseInt(countMatch[2], 10) <= 0) {
        return false;
      }
    }

    const suffixMatch = /^(.*?):([A-Z]+)$/.exec(text);
    if (suffixMatch) {
      text = suffixMatch[1].trim();
      const suffix = suffixMatch[2].toUpperCase();
      if (!SLMP_WRITE_DTYPE_SUFFIXES.has(suffix)) {
        return false;
      }
      if ((suffix === "STR" || suffix === "STRING") && !countMatch) {
        return false;
      }
    }

    const bitMatch = /^(.*?)\.([0-9A-F])$/i.exec(text);
    if (bitMatch) {
      if (countMatch || suffixMatch) {
        return false;
      }
      text = bitMatch[1].trim();
      const parsed = slmpParseWriteDeviceToken(text, family);
      return Boolean(parsed && parsed.unit === "word");
    }

    const parsed = slmpParseWriteDeviceToken(text, family);
    if (!parsed) {
      return false;
    }
    if (suffixMatch) {
      const suffix = suffixMatch[2].toUpperCase();
      if ((suffix === "STR" || suffix === "STRING") && parsed.unit !== "word") {
        return false;
      }
    }
    return true;
  }

  function slmpParseWriteLegacyStringAddress(text, family) {
    for (const code of SLMP_WRITE_DEVICE_CODES) {
      const prefix = code + "STR";
      if (!text.startsWith(prefix)) {
        continue;
      }
      const match = /^([0-9A-F]+)\s*,\s*(\d+)$/.exec(text.slice(prefix.length));
      if (!match || Number.parseInt(match[2], 10) <= 0) {
        return false;
      }
      const parsed = slmpParseWriteDeviceToken(code + match[1], family);
      return Boolean(parsed && parsed.unit === "word");
    }
    return null;
  }

  function slmpParseWriteDeviceToken(text, family) {
    for (const code of SLMP_WRITE_DEVICE_CODES) {
      if (!text.startsWith(code)) {
        continue;
      }
      if (!slmpWriteDeviceCodeSupportedForFamily(code, family)) {
        return null;
      }
      const numberText = text.slice(code.length);
      const info = SLMP_WRITE_DEVICE_INFO[code];
      if (!numberText || !slmpValidateWriteDeviceNumber(code, numberText, info.radix, family)) {
        return null;
      }
      return { code: code, unit: info.unit };
    }
    return null;
  }

  function slmpWriteDeviceCodeSupportedForFamily(code, family) {
    if (code === "G" || code === "HG") {
      return false;
    }
    const normalizedFamily = String(family || "").trim().toLowerCase();
    const unsupported = SLMP_WRITE_UNSUPPORTED_DEVICE_CODES_BY_FAMILY[normalizedFamily];
    return !(unsupported && unsupported.indexOf(code) !== -1);
  }

  function slmpValidateWriteDeviceNumber(code, numberText, defaultRadix, family) {
    const radix = (family === "iq-f" && (code === "X" || code === "Y")) ? 8 : defaultRadix;
    if (radix === 8) {
      return /^[0-7]+$/.test(numberText);
    }
    if (radix === 16) {
      return /^[0-9A-F]+$/i.test(numberText);
    }
    return /^\d+$/.test(numberText);
  }

  function slmpValidateWriteLiteral(value, connectionId) {
    const text = String(value == null ? "" : value).trim();
    if (!text) {
      return true;
    }
    try {
      const parsed = JSON.parse(text);
      if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
        return false;
      }
      return Object.keys(parsed).every(function (address) {
        return slmpValidateWriteAddress(address, connectionId);
      });
    } catch (_error) {
    }

    const lines = text.split(/\r?\n/);
    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed || trimmed.startsWith("#")) {
        continue;
      }
      const separatorIndex = trimmed.indexOf("=");
      if (separatorIndex <= 0) {
        return false;
      }
      if (!slmpValidateWriteAddress(trimmed.slice(0, separatorIndex).trim(), connectionId)) {
        return false;
      }
    }
    return true;
  }

  function slmpValidateWriteIntegerString(value, min, max, base) {
    const text = String(value == null ? "" : value).trim();
    if (base === 16 && !/^(?:0x)?[0-9a-f]+$/i.test(text)) {
      return false;
    }
    if (base !== 16 && !/^\d+$/.test(text)) {
      return false;
    }
    const parsed = Number.parseInt(text, base || 10);
    return Number.isInteger(parsed) && parsed >= min && parsed <= max;
  }

  function slmpValidateWriteTargetLiteral(value) {
    const text = String(value == null ? "" : value).trim();
    if (!text) {
      return true;
    }
    try {
      const parsed = JSON.parse(text);
      if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
        return false;
      }
      const keys = Object.keys(parsed);
      if (keys.length === 0) {
        return true;
      }
      const allowed = new Set(["network", "station", "moduleIO", "module_io", "multidrop"]);
      for (const key of keys) {
        if (!allowed.has(key)) {
          return false;
        }
      }
      if (parsed.network !== undefined && !slmpValidateWriteIntegerString(parsed.network, 0, 255)) {
        return false;
      }
      if (parsed.station !== undefined && !slmpValidateWriteIntegerString(parsed.station, 0, 255)) {
        return false;
      }
      const moduleIO = parsed.moduleIO !== undefined ? parsed.moduleIO : parsed.module_io;
      if (moduleIO !== undefined && !slmpValidateWriteIntegerString(moduleIO, 0, 65535, 16)) {
        return false;
      }
      if (parsed.multidrop !== undefined && !slmpValidateWriteIntegerString(parsed.multidrop, 0, 255)) {
        return false;
      }
      return true;
    } catch (_error) {
      return false;
    }
  }

  function slmpValidateWriteSourceField(value, typeSelector, literalValidator, fallbackType) {
    const type = slmpGetWriteCurrentType(typeSelector, fallbackType);
    if (!type || type === "str") {
      return literalValidator(value);
    }
    return slmpValidateWriteReferencePath(value);
  }

  function setupSlmpSourceField(sourceId, typeId, literalId, hiddenId) {
    const sourceField = $(sourceId);
    const typeField = $(typeId);
    const literalField = $(literalId);
    const literalRow = literalField.closest(".form-row");

    sourceField.typedInput({
      default: "str",
      typeField: typeField,
      types: ["msg", "flow", "global", "env", "str"]
    });

    const refresh = function () {
      const type = sourceField.typedInput("type");
      const isLiteral = type === "str";
      literalRow.toggle(isLiteral);
      if (isLiteral) {
        sourceField.typedInput("value", literalField.val());
      }
      $(hiddenId).val(isLiteral ? literalField.val() : sourceField.typedInput("value"));
    };

    sourceField.on("change", refresh);
    literalField.on("change keyup", refresh);
    refresh();
    return refresh;
  }

  RED.nodes.registerType("slmp-write", {
    category: "SLMP",
    color: "#FCE5CD",
    defaults: {
      name: { value: "" },
      connection: { value: "", type: "slmp-connection", required: true },
      updates: {
        value: "",
        validate: function (value) {
          const connectionId = this && this.connection;
          return slmpValidateWriteSourceField(value, "#node-input-updatesType", function (literal) {
            return slmpValidateWriteLiteral(literal, connectionId);
          }, this && this.updatesType);
        }
      },
      updatesType: { value: "str", required: true },
      routeTarget: {
        value: "",
        validate: function (value) {
          return slmpValidateWriteSourceField(value, "#node-input-routeTargetType", slmpValidateWriteTargetLiteral, this && this.routeTargetType);
        }
      },
      routeTargetType: { value: "str", required: true },
      metadataMode: { value: "full", required: true },
      errorHandling: { value: "throw", required: true },
      outputs: { value: 1 }
    },
    inputs: 1,
    outputs: 1,
    icon: "font-awesome/fa-upload",
    label: function () {
      return this.name || "slmp write";
    },
    oneditprepare: function () {
      const sourceField = $("#node-input-updatesSource");
      const literalField = $("#node-input-updatesLiteral");
      literalField.val(this.updates || "");
      sourceField.val(this.updates || "");
      $("#node-input-updatesType").val(this.updatesType || "str");
      const refreshUpdates = setupSlmpSourceField(
        "#node-input-updatesSource",
        "#node-input-updatesType",
        "#node-input-updatesLiteral",
        "#node-input-updates"
      );
      const routeField = $("#node-input-routeTargetSource");
      const routeLiteral = $("#node-input-routeTargetLiteral");
      routeLiteral.val(this.routeTarget || "");
      routeField.val(this.routeTarget || "");
      $("#node-input-routeTargetType").val(this.routeTargetType || "str");
      const refreshRoute = setupSlmpSourceField(
        "#node-input-routeTargetSource",
        "#node-input-routeTargetType",
        "#node-input-routeTargetLiteral",
        "#node-input-routeTarget"
      );
      refreshUpdates();
      refreshRoute();
    },
    oneditsave: function () {
      const sourceField = $("#node-input-updatesSource");
      const type = sourceField.typedInput("type");
      $("#node-input-updatesType").val(type);
      $("#node-input-updates").val(type === "str" ? $("#node-input-updatesLiteral").val() : sourceField.typedInput("value"));
      const routeField = $("#node-input-routeTargetSource");
      const routeType = routeField.typedInput("type");
      $("#node-input-routeTargetType").val(routeType);
      $("#node-input-routeTarget").val(
        routeType === "str" ? $("#node-input-routeTargetLiteral").val() : routeField.typedInput("value")
      );
      this.outputs = $("#node-input-errorHandling").val() === "output2" ? 2 : 1;
    }
  });
</script>

<script type="text/html" data-template-name="slmp-write">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" />
  </div>
  <div class="form-row">
    <label for="node-input-connection"><i class="fa fa-link"></i> Connection</label>
    <input type="text" id="node-input-connection" />
  </div>
  <div class="form-row">
    <label for="node-input-updatesSource"><i class="fa fa-sign-in"></i> Source</label>
    <input type="hidden" id="node-input-updatesType" />
    <input type="text" id="node-input-updatesSource" style="width: 70%;" />
    <input type="hidden" id="node-input-updates" />
  </div>
  <div class="form-row" id="node-input-updatesLiteralRow">
    <label for="node-input-updatesLiteral"><i class="fa fa-pencil"></i> Static updates</label>
    <textarea id="node-input-updatesLiteral" style="height: 140px;" placeholder="{&quot;D100&quot;: 42, &quot;D100:I&quot;: -1, &quot;D100,3&quot;: [10,11,12], &quot;D100:STR,10&quot;: &quot;HELLO&quot;}&#10;&#10;or&#10;D100=42&#10;D100:I=-1&#10;D100:STR,10=&quot;HELLO&quot;"></textarea>
  </div>
  <div class="form-row">
    <label for="node-input-routeTargetSource"><i class="fa fa-sitemap"></i> Route</label>
    <input type="hidden" id="node-input-routeTargetType" />
    <input type="text" id="node-input-routeTargetSource" style="width: 70%;" />
    <input type="hidden" id="node-input-routeTarget" />
  </div>
  <div class="form-row" id="node-input-routeTargetLiteralRow">
    <label for="node-input-routeTargetLiteral"><i class="fa fa-code"></i> Route JSON</label>
    <textarea id="node-input-routeTargetLiteral" style="height: 90px;" placeholder="{&quot;network&quot;:0,&quot;station&quot;:255,&quot;moduleIO&quot;:&quot;03FF&quot;,&quot;multidrop&quot;:0}"></textarea>
  </div>
  <div class="form-row">
    <label for="node-input-metadataMode"><i class="fa fa-database"></i> Metadata</label>
    <select id="node-input-metadataMode">
      <option value="full">Full msg.slmp</option>
      <option value="minimal">Minimal msg.slmp</option>
      <option value="off">Do not modify msg.slmp</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-input-errorHandling"><i class="fa fa-exclamation"></i> Errors</label>
    <select id="node-input-errorHandling">
      <option value="throw">Throw</option>
      <option value="msg">msg.error</option>
      <option value="output2">Second output</option>
    </select>
  </div>
</script>

<script type="text/html" data-help-name="slmp-write">
  <p>Writes one or more SLMP values using the same named-device foundation as the SLMP libraries, extended here with count and string forms.</p>
  <p>Preferred dynamic input is <code>msg.payload</code> or <code>msg.updates</code> as an object, for example <code>{ "D100": 42, "D100:I": -1, "D100,3": [10,11,12], "D100:STR,10": "HELLO" }</code>.</p>
  <p>Count-qualified addresses expect arrays, while string addresses expect a string value. <code>DSTR100,10</code> is accepted as a compatibility alias.</p>
  <p>The configured source can be literal text, <code>msg</code>, <code>flow</code>, <code>global</code>, or <code>env</code>. Literal text accepts JSON objects or <code>address=value</code> lines.</p>
  <p>Per-request routing can be supplied as <code>msg.target</code>, <code>msg.slmp.target</code>, or a configured route source. Route objects can include <code>network</code>, <code>station</code>, <code>moduleIO</code>, and <code>multidrop</code>.</p>
  <p>Metadata can emit full <code>msg.slmp</code>, a minimal object with only the effective target and item count, or leave <code>msg.slmp</code> unchanged.</p>
  <p>You can also send a single write with <code>msg.address</code>, optional <code>msg.dtype</code>, and the value in <code>msg.value</code> or <code>msg.payload</code>. If <code>msg.address</code> already includes <code>,count</code>, the dtype is inserted before the count suffix.</p>
  <p>Send <code>msg.connect</code>, <code>msg.disconnect</code>, or <code>msg.reinitialize</code> as <code>true</code>, or send the same words in <code>msg.topic</code>, to control the shared connection.</p>
  <p>The node keeps the caller-visible logical write shape. It does not silently retry one logical update as a different fallback split request.</p>
  <p>Error handling can throw, attach the error to <code>msg.error</code>, or emit the failed message on the second output.</p>
</script>
