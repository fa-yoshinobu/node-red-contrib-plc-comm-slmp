<script type="text/javascript">
  function slmpValidateIntegerInRange(value, min, max, options) {
    const text = String(value == null ? "" : value).trim();
    const base = options && options.base ? options.base : 10;
    if (!text) {
      return false;
    }
    if (base === 16 && !/^(?:0x)?[0-9a-f]+$/i.test(text)) {
      return false;
    }
    if (base === 10 && !/^\d+$/.test(text)) {
      return false;
    }
    const parsed = Number.parseInt(text, base);
    return Number.isInteger(parsed) && parsed >= min && parsed <= max;
  }

  RED.nodes.registerType("slmp-connection", {
    category: "config",
    defaults: {
      name: { value: "" },
      host: { value: "", required: true },
      port: {
        value: 1025,
        required: true,
        validate: function (value) {
          return slmpValidateIntegerInRange(value, 1, 65535);
        }
      },
      transport: { value: "tcp", required: true },
      timeout: {
        value: 3000,
        required: true,
        validate: function (value) {
          return slmpValidateIntegerInRange(value, 1, 2147483647);
        }
      },
      plcProfile: { value: "", required: true },
      useRemotePassword: { value: false, required: true },
      monitoringTimer: {
        value: 16,
        required: true,
        validate: function (value) {
          return slmpValidateIntegerInRange(value, 0, 65535);
        }
      },
      network: {
        value: "0",
        required: true,
        validate: function (value) {
          return slmpValidateIntegerInRange(value, 0, 255);
        }
      },
      station: {
        value: "255",
        required: true,
        validate: function (value) {
          return slmpValidateIntegerInRange(value, 0, 255);
        }
      },
      moduleIO: {
        value: "03FF",
        required: true,
        validate: function (value) {
          return slmpValidateIntegerInRange(value, 0, 65535, { base: 16 });
        }
      },
      multidrop: {
        value: "0",
        required: true,
        validate: function (value) {
          return slmpValidateIntegerInRange(value, 0, 255);
        }
      }
    },
    credentials: {
      remotePassword: { type: "password" }
    },
    label: function () {
      return this.name || this.host + ":" + this.port;
    },
    oneditprepare: function () {
      const select = $("#node-config-input-plcProfile");
      const current = select.val();
      $.getJSON("plc-comm/slmp/profiles", function (profiles) {
        select.find("option:not(:first)").remove();
        profiles.filter(function (profile) { return profile.connectable; }).forEach(function (profile) {
          $("<option>")
            .val(profile.canonicalName)
            .text(profile.displayName)
            .appendTo(select);
        });
        select.val(current);
      });
      const usePassword = $("#node-config-input-useRemotePassword");
      const password = $("#node-config-input-remotePassword");
      const updatePasswordState = function () {
        password.prop("disabled", !usePassword.is(":checked"));
      };
      usePassword.on("change", updatePasswordState);
      updatePasswordState();
    }
  });
</script>

<script type="text/html" data-template-name="slmp-connection">
  <div class="form-row">
    <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-config-input-name" />
  </div>
  <div class="form-row">
    <label for="node-config-input-host"><i class="fa fa-globe"></i> Host</label>
    <input type="text" id="node-config-input-host" placeholder="192.168.0.10" />
  </div>
  <div class="form-row">
    <label for="node-config-input-port"><i class="fa fa-plug"></i> Port</label>
    <input type="text" id="node-config-input-port" placeholder="1025" />
  </div>
  <div class="form-row">
    <label for="node-config-input-transport"><i class="fa fa-random"></i> Transport</label>
    <select id="node-config-input-transport">
      <option value="tcp">TCP</option>
      <option value="udp">UDP</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-config-input-timeout"><i class="fa fa-clock-o"></i> Timeout ms</label>
    <input type="text" id="node-config-input-timeout" placeholder="3000" />
  </div>
  <div class="form-row">
    <label for="node-config-input-plcProfile"><i class="fa fa-cog"></i> PLC type</label>
    <select id="node-config-input-plcProfile">
      <option value="">Select PLC type</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-config-input-useRemotePassword"><i class="fa fa-lock"></i> Password auth</label>
    <input type="checkbox" id="node-config-input-useRemotePassword" style="display:inline-block; width:auto; vertical-align:top;" />
    <span>Use remote password</span>
  </div>
  <div class="form-row">
    <label for="node-config-input-remotePassword"><i class="fa fa-lock"></i> Remote password</label>
    <input type="password" id="node-config-input-remotePassword" autocomplete="off" placeholder="required when enabled" />
  </div>
  <div class="form-row">
    <label for="node-config-input-monitoringTimer"><i class="fa fa-hourglass-half"></i> Monitor timer</label>
    <input type="text" id="node-config-input-monitoringTimer" placeholder="16" />
  </div>
  <div class="form-row">
    <label for="node-config-input-network"><i class="fa fa-sitemap"></i> Network</label>
    <input type="text" id="node-config-input-network" placeholder="0" />
  </div>
  <div class="form-row">
    <label for="node-config-input-station"><i class="fa fa-sitemap"></i> Station</label>
    <input type="text" id="node-config-input-station" placeholder="255" />
  </div>
  <div class="form-row">
    <label for="node-config-input-moduleIO"><i class="fa fa-sitemap"></i> Module I/O</label>
    <input type="text" id="node-config-input-moduleIO" placeholder="03FF" />
  </div>
  <div class="form-row">
    <label for="node-config-input-multidrop"><i class="fa fa-sitemap"></i> Multidrop</label>
    <input type="text" id="node-config-input-multidrop" placeholder="0" />
  </div>
</script>

<script type="text/html" data-help-name="slmp-connection">
  <p>Reusable SLMP connection profile for MELSEC PLC access over binary 3E or 4E frames.</p>
  <p>Select one explicit PLC type. The node derives the frame type, access profile, and string address rules from that type.</p>
  <p>Strict profile rejects features known unavailable on the selected PLC profile before sending.</p>
  <p>If the PLC route is protected by a remote password, enable <b>Use remote password</b> and enter a non-empty credential. The node sends remote-password unlock after connecting and tries remote-password lock before disconnecting.</p>
  <p><code>slmp-read</code> and <code>slmp-write</code> can send <code>connect</code>, <code>disconnect</code>, and <code>reinitialize</code> control messages through this shared connection.</p>
</script>
